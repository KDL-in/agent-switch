services:
  clash:
    image: metacubex/mihomo:latest
    container_name: cc-switch-clash
    restart: unless-stopped
    volumes:
      - ./config/clash:/root/.config/mihomo
    ports:
      - "${CLASH_HTTP_PORT:-7890}:7890"
      - "127.0.0.1:${CLASH_API_PORT:-9090}:9090"
    networks:
      - agent-switch-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  clash-ui:
    image: haishanh/yacd:latest
    container_name: cc-switch-clash-ui
    restart: unless-stopped
    depends_on:
      clash:
        condition: service_healthy
    ports:
      - "127.0.0.1:${CLASH_UI_PORT:-9097}:80"
    networks:
      - agent-switch-net

  cc-switch:
    image: ghcr.io/laliet/cc-switch-web:latest
    container_name: cc-switch-web
    restart: unless-stopped
    depends_on:
      clash:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      # 出站流量走 Clash 代理
      HTTP_PROXY: http://clash:7890
      HTTPS_PROXY: http://clash:7890
      NO_PROXY: localhost,127.0.0.1,clash,cc-switch-clash
      # 允许局域网访问 Web UI（Docker Desktop 下从宿主机访问）
      ALLOW_LAN_CORS: "1"
      ENABLE_HSTS: "false"
      ALLOW_HTTP_BASIC_OVER_HTTP: "1"
    volumes:
      - ./data/cc-switch:/home/ccswitch/.cc-switch
    ports:
      - "127.0.0.1:${CC_SWITCH_PROXY_PORT:-3457}:${CC_SWITCH_PROXY_PORT:-3457}"
    networks:
      - agent-switch-net

  cc-switch-gate:
    image: nginx:alpine
    container_name: cc-switch-gate
    restart: unless-stopped
    depends_on:
      cc-switch:
        condition: service_started
    volumes:
      - ./config/nginx/cc-switch-gate.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${CC_SWITCH_PORT:-3000}:80"
    networks:
      - agent-switch-net

  cc-switch-proxy:
    image: alpine/socat
    container_name: cc-switch-proxy-forward
    network_mode: "service:cc-switch"
    depends_on:
      cc-switch:
        condition: service_started
    command: TCP-LISTEN:${CC_SWITCH_PROXY_PORT:-3457},fork,reuseaddr,bind=0.0.0.0 TCP:127.0.0.1:3456
    restart: unless-stopped

networks:
  agent-switch-net:
    driver: bridge
